<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      margin-bottom: 0.5em;
      font-size: 2.5em;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    p {
      max-width: 400px;
      text-align: center;
      font-size: 1.1em;
      line-height: 1.6;
      margin: 0;
    }
    .enhanced-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #ff6b6b;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="enhanced-badge">ENHANCED</div>
  <h1>Hello, world!</h1>
  <p>Welcome to your first web page. This is a minimal example showing a heading and a short paragraph styled with inline CSS.</p>
</body>
</html>
